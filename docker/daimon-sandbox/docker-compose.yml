services:
  daimon-sandbox:
    build: .
    container_name: daimon-sandbox
    restart: unless-stopped

    # Security hardening
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETUID    # gosu privilege drop in entrypoint
      - SETGID    # gosu privilege drop in entrypoint
      - CHOWN     # entrypoint file ownership
      - FOWNER    # entrypoint chmod

    # Resources
    mem_limit: 8g
    cpus: "2.0"

    # Network (custom bridge, private nets blocked via iptables)
    networks:
      - daimon-net

    # GitHub token: bind-mounted as root:root 600 from host.
    # The agent user (uid 1000) CANNOT read this file.
    # Only the credential-server (root) can read it and serve via socket.
    #
    # Setup on host (once, as root):
    #   mkdir -p /home/daimon/.hermes/profiles/daimon/secrets
    #   echo "github_pat_..." > /home/daimon/.hermes/profiles/daimon/secrets/gh_token
    #   chmod 600 /home/daimon/.hermes/profiles/daimon/secrets/gh_token
    #   chown root:root /home/daimon/.hermes/profiles/daimon/secrets/gh_token
    volumes:
      - hermes-repo:/opt/hermes-agent:ro
      - ${GH_TOKEN_PATH:-./secrets/gh_token.txt}:/run/secrets/gh_token:ro

volumes:
  hermes-repo:

networks:
  daimon-net:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.enable_ip_masquerade: "true"
